<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JOSH | Collections</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body { 
            font-family: 'Helvetica Neue', sans-serif; 
            /* Updated to match your primary index.html background */
            background: radial-gradient(circle, #0a0a0a 33%, #4f0303 100%);
            color: white; 
            overflow-x: hidden;
            min-height: 100vh;
        }

        a { color: white; text-decoration: none; }
        a:hover { color: #ec1004; transform: scale(1.0); transition: 0.2s; }

        /* Navigation: Centered Layout */
        nav { 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            padding: 30px 50px; 
            gap: 20px; 
            position: relative; 
        }

        .logo { font-size: 1.5rem; font-weight: bold; letter-spacing: 2px; }
        
        nav ul { 
            display: flex; 
            list-style: none;
            text-align: center; 
            gap: 30px; 
            font-size: 1 rem; 
            letter-spacing: 1px; 
            justify-content: center;
        }

        .menu-toggle { display: none; font-size: 30px; color: #f8047a; cursor: pointer; }

        /* Container */
        .page-container { 
            max-width: 1000px; 
            margin: 0 auto; 
            padding: 20px;
        }

        /* Two-Photo Layout */
        .explore-grid { 
            display: flex; 
            gap: 20px; 
            height: 80vh; 
            width: 120%; 
        }
        .explore-item { 
            flex: 1; 
            position: relative; 
            overflow: hidden; 
            cursor: pointer;
            border-radius: 8px;
        }
        .explore-item img { 
            width: 460px; height: 600px; object-fit:cover; 
            transition: transform 0.5s ease;
        }
        .explore-item:hover img { transform: scale(1.05); }
        
        .overlay { 
            position: absolute; inset: 0; 
            margin-top: 250px;
            width: 250px;
            border-radius: 40px ;
            text-align: center;
            height: 200px;
            margin-left: 110px;
            display: flex; flex-direction: column;
            justify-content: center; align-items: center;
            background: rgba(43, 39, 39, 0.584);
            color: #03f4d8;
        }
        .overlay h2 { font-size: 1.8rem; text-transform: uppercase; letter-spacing: 2px; }

        a { color: white; text-decoration: none; }
        a:hover { color: #ec1004; transform: scale(1.2); transition: 0.2s; }

        footer {
    padding: 40px 20px;
    margin-top: 50px;
    border-top: 1px solid rgba(255, 255, 255, 0.1);
    text-align: center;
    color: #888;
    font-size: 0.8rem;
    letter-spacing: 1px;
}

.footer-content {
    display: flex;
    flex-direction: column;
    gap: 15px;
    align-items: center;
}

.social-links a {
    color: #f8047a;
    margin: 0 10px;
    text-decoration: none;
}

.social-links a:hover {
    color: white;
}

        /* Mobile Responsive */
        @media (max-width: 768px) {
            .explore-grid { flex-direction: column; height: 900px }
            .explore-item { height: 40vh; }
            .menu-toggle { display: block; }
            .overlay{margin-left: 60px;}
            nav ul { display: none; flex-direction: column; gap: 15px; position: absolute; top: 100px; width: 100%; background: #3b0505; padding: 20px; z-index: 1000; }
            nav ul.active { display: flex; }
        }
    </style>
</head>
<body>

    <nav>
        <div class="logo">J.S.H.</div>
        <div class="menu-toggle" id="mobile-menu">☰</div>
        <ul id="nav-list">
            <a href="index.html"><li>HOME</li></a>
            <a href="#"><li>SIGN UP</li></a>
            <a href="#"><li>COLLECTIONS</li></a>
            <a href="#"><li>SHOP ALL</li></a>
        </ul>
    </nav>

    <div class="page-container">
        <div class="explore-grid">
            <div class="explore-item">
                <img src="monsoon.jpg" alt="Monsoon Collection">
                <div class="overlay">
                    <h2>Explore Monsoon</h2>
                </div>
            </div>
            <div class="explore-item">
                <img src="card1.jpg" alt="New Fashion">
                <div class="overlay">
                    <h2>New<br>Fashion</h2>
                </div>
            </div>
        </div>
    </div>
    <footer>
    <div class="footer-content">
        <p>&copy; 2026 J.S.H. Timeless Luxury. All rights reserved.</p>
        <div class="social-links">
            <a href="#">Instagram</a>
            <a href="#">Facebook</a>
            <a href="#">Contact</a>
        </div>
    </div>
</footer>

    <script>
        const menuToggle = document.getElementById('mobile-menu');
        const navList = document.getElementById('nav-list');
        menuToggle.addEventListener('click', () => { navList.classList.toggle('active'); });
    </script>
</body>
</html>
